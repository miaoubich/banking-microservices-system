spring.application.name=api-gateway
#
####
#Steps to build api-gateway
#Responsibilities:
#
#Single entry point for all client traffic
#
#Route requests to the correct service (account-service, auth-service, etc.)
#
#Validate JWT tokens issued by Keycloak before forwarding requests
#
#Permit public endpoints (/api/auth/register, /api/auth/login) without JWT
#
#Dependencies needed:
#
#spring-cloud-starter-gateway — reactive gateway (uses WebFlux, not Spring MVC)
#
#spring-boot-starter-oauth2-resource-server — JWT validation
#
#spring-cloud-starter-netflix-eureka-client — service discovery for routing
#
#spring-boot-starter-actuator — health checks
#
#Routing:
#
#/api/auth/**     → auth-service (public)
#/api/accounts/** → account-service (protected, requires JWT)
#
#Copy
#The gateway validates the JWT using Keycloak's public key — no need to call Keycloak on every request.
#
#Note: Spring Cloud Gateway uses WebFlux (reactive), not Spring MVC — so no spring-boot-starter-web dependency, otherwise it will conflict.
####
