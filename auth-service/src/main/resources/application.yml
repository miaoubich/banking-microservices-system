server:
  port: 8082

spring:
  application:
    name: auth-service

  data:
   mongodb:
    uri: mongodb://localhost:27017/userdb
   redis:
    host: localhost
    port: 6379
  cache:
   type: redis
   redis:
    time-to-live: 600000

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090/realms/Maradga

keycloak:
  server-url: http://localhost:9090
  realm: Maradga
  client-id: banking-system
  client-secret: ${KEYCLOAK_CLIENT_SECRET}

eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,caches,env
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 0.0

