services:
  # Infrastructure Services
  postgres:
    image: postgres:15
    container_name: banking-postgres
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - banking-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3

  zookeeper:
    image: confluentinc/cp-zookeeper:7.0.1
    container_name: banking-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - banking-network

  kafka:
    image: wurstmeister/kafka:2.13-2.8.1
    container_name: banking-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - banking-network

  # Discovery Services (Multiple Instances)
  eureka-1:
    build: ./discovery-service
    container_name: eureka-1
    ports:
      - "8761:8761"
    environment:
      - EUREKA_INSTANCE_HOSTNAME=eureka-1
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=true
      - EUREKA_CLIENT_FETCH_REGISTRY=true
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-2:8761/eureka/
    networks:
      - banking-network

  eureka-2:
    build: ./discovery-service
    container_name: eureka-2
    ports:
      - "8762:8761"
    environment:
      - EUREKA_INSTANCE_HOSTNAME=eureka-2
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=true
      - EUREKA_CLIENT_FETCH_REGISTRY=true
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-1:8761/eureka/
    networks:
      - banking-network

  # API Gateway (Multiple Instances)
  api-gateway-1:
    build: ./api-gateway
    container_name: api-gateway-1
    ports:
      - "8080:8080"
    depends_on:
      - eureka-1
      - eureka-2
    environment:
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-1:8761/eureka/,http://eureka-2:8761/eureka/
    networks:
      - banking-network

  api-gateway-2:
    build: ./api-gateway
    container_name: api-gateway-2
    ports:
      - "8090:8080"
    depends_on:
      - eureka-1
      - eureka-2
    environment:
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-1:8761/eureka/,http://eureka-2:8761/eureka/
    networks:
      - banking-network

  # Business Services
  account-service-1:
    build: ./account-service
    container_name: account-service-1
    ports:
      - "8081:8081"
    depends_on:
      - postgres
      - kafka
      - eureka-1
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/accountdb
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-1:8761/eureka/,http://eureka-2:8761/eureka/
    networks:
      - banking-network

  account-service-2:
    build: ./account-service
    container_name: account-service-2
    ports:
      - "8091:8081"
    depends_on:
      - postgres
      - kafka
      - eureka-1
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/accountdb
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-1:8761/eureka/,http://eureka-2:8761/eureka/
    networks:
      - banking-network

  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "8082:8082"
    depends_on:
      - postgres
      - eureka-1
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/userdb
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-1:8761/eureka/,http://eureka-2:8761/eureka/
    networks:
      - banking-network

  notification-service-1:
    build: ./notification-service
    container_name: notification-service-1
    ports:
      - "8084:8084"
    depends_on:
      - kafka
      - eureka-1
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-1:8761/eureka/,http://eureka-2:8761/eureka/
    networks:
      - banking-network

  notification-service-2:
    build: ./notification-service
    container_name: notification-service-2
    ports:
      - "8094:8084"
    depends_on:
      - kafka
      - eureka-1
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-1:8761/eureka/,http://eureka-2:8761/eureka/
    networks:
      - banking-network

  # Load Balancer
  nginx:
    image: nginx:alpine
    container_name: banking-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api-gateway-1
      - api-gateway-2
    networks:
      - banking-network

volumes:
  postgres_data:

networks:
  banking-network:
    driver: bridge